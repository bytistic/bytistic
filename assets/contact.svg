<svg width="700" height="130" viewBox="0 0 700 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="contactGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C6A0F6"/>
      <stop offset="50%" stop-color="#8BD5CA"/>
      <stop offset="100%" stop-color="#F5A97F"/>
    </linearGradient>
  </defs>

  <rect width="700" height="130" fill="#24273A" rx="12"/>

  <text x="350" y="30" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#A5ADCB">~/contact</text>

  <!-- Twitter/X (centered) -->
  <g transform="translate(325, 55)">
    <circle cx="25" cy="25" r="22" fill="#363A4F" stroke="#F5A97F" stroke-width="1" stroke-opacity="0.3"/>
    <!-- X mark -->
    <line x1="16" y1="16" x2="34" y2="34" stroke="#F5A97F" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="34" y1="16" x2="16" y2="34" stroke="#F5A97F" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <!-- Pulse -->
    <circle cx="25" cy="25" r="22" fill="none" stroke="#F5A97F" stroke-width="1" opacity="0">
      <animate attributeName="r" values="22;32" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="25" y="62" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#F5A97F" opacity="0.7">@bytisticx</text>
  </g>
</svg>
