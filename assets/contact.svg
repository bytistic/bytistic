<svg width="500" height="130" viewBox="0 0 500 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="contactGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C6A0F6"/>
      <stop offset="50%" stop-color="#8BD5CA"/>
      <stop offset="100%" stop-color="#F5A97F"/>
    </linearGradient>
  </defs>

  <rect width="500" height="130" fill="#24273A" rx="12"/>

  <!-- Section title -->
  <text x="250" y="25" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#A5ADCB">~/contact</text>

  <!-- === GitHub === -->
  <g transform="translate(55, 55)">
    <!-- Icon circle -->
    <circle cx="25" cy="25" r="20" fill="#363A4F" stroke="#C6A0F6" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Simple GitHub icon (mark) -->
    <path d="M25 10c-8 0-14.5 6.5-14.5 14.5 0 6.4 4.2 11.8 10 13.7.7.1 1-.3 1-.7v-2.6c-4.1.9-5-1.7-5-1.7-.7-1.7-1.6-2.2-1.6-2.2-1.3-.9.1-.9.1-.9 1.4.1 2.2 1.5 2.2 1.5 1.3 2.2 3.4 1.6 4.2 1.2.1-1 .5-1.6.9-2-3.2-.4-6.6-1.6-6.6-7.2 0-1.6.6-2.9 1.5-3.9-.2-.4-.7-1.9.1-3.9 0 0 1.2-.4 4 1.5a14 14 0 017.3 0c2.8-1.9 4-1.5 4-1.5.8 2 .3 3.5.1 3.9 1 1 1.5 2.3 1.5 3.9 0 5.6-3.4 6.8-6.6 7.2.5.4 1 1.3 1 2.6v3.8c0 .4.3.8 1 .7 5.8-1.9 10-7.3 10-13.7C39.5 16.5 33 10 25 10z" fill="#C6A0F6" opacity="0.7"/>
    <!-- Pulse animation -->
    <circle cx="25" cy="25" r="20" fill="none" stroke="#C6A0F6" stroke-width="1" opacity="0">
      <animate attributeName="r" values="20;28" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="25" y="58" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6E738D">GitHub</text>
  </g>

  <!-- === LinkedIn === -->
  <g transform="translate(155, 55)">
    <circle cx="25" cy="25" r="20" fill="#363A4F" stroke="#8AADF4" stroke-width="1" stroke-opacity="0.3"/>
    <!-- LinkedIn "in" -->
    <rect x="16" y="16" width="6" height="14" rx="1" fill="#8AADF4" opacity="0.7"/>
    <circle cx="19" cy="13" r="3" fill="#8AADF4" opacity="0.7"/>
    <rect x="24" y="20" width="10" height="10" rx="1" fill="#8AADF4" opacity="0.7"/>
    <circle cx="25" cy="25" r="20" fill="none" stroke="#8AADF4" stroke-width="1" opacity="0">
      <animate attributeName="r" values="20;28" dur="2s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0.3;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <text x="25" y="58" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6E738D">LinkedIn</text>
  </g>

  <!-- === Email === -->
  <g transform="translate(255, 55)">
    <circle cx="25" cy="25" r="20" fill="#363A4F" stroke="#8BD5CA" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Envelope -->
    <rect x="16" y="18" width="18" height="12" rx="1.5" fill="none" stroke="#8BD5CA" stroke-width="1.2" opacity="0.7"/>
    <polyline points="16,18 25,25 34,18" fill="none" stroke="#8BD5CA" stroke-width="1.2" opacity="0.7"/>
    <circle cx="25" cy="25" r="20" fill="none" stroke="#8BD5CA" stroke-width="1" opacity="0">
      <animate attributeName="r" values="20;28" dur="2s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0.3;0" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <text x="25" y="58" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6E738D">Email</text>
  </g>

  <!-- === Twitter/X === -->
  <g transform="translate(355, 55)">
    <circle cx="25" cy="25" r="20" fill="#363A4F" stroke="#F5A97F" stroke-width="1" stroke-opacity="0.3"/>
    <!-- X mark -->
    <line x1="17" y1="17" x2="33" y2="33" stroke="#F5A97F" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="33" y1="17" x2="17" y2="33" stroke="#F5A97F" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <circle cx="25" cy="25" r="20" fill="none" stroke="#F5A97F" stroke-width="1" opacity="0">
      <animate attributeName="r" values="20;28" dur="2s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0.3;0" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <text x="25" y="58" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6E738D">X / Twitter</text>
  </g>

  <!-- === Website/Portfolio === -->
  <g transform="translate(455, 55)">
    <circle cx="25" cy="25" r="20" fill="#363A4F" stroke="#EED49F" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Globe -->
    <circle cx="25" cy="25" r="8" fill="none" stroke="#EED49F" stroke-width="1.2" opacity="0.7"/>
    <ellipse cx="25" cy="25" rx="4" ry="8" fill="none" stroke="#EED49F" stroke-width="1" opacity="0.7"/>
    <line x1="17" y1="25" x2="33" y2="25" stroke="#EED49F" stroke-width="1" opacity="0.7"/>
    <circle cx="25" cy="25" r="20" fill="none" stroke="#EED49F" stroke-width="1" opacity="0">
      <animate attributeName="r" values="20;28" dur="2s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0.3;0" dur="2s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <text x="25" y="58" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6E738D">Website</text>
  </g>
</svg>
