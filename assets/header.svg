<svg width="960" height="350" viewBox="0 0 960 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C6A0F6"/>
      <stop offset="30%" stop-color="#8BD5CA"/>
      <stop offset="60%" stop-color="#EED49F"/>
      <stop offset="100%" stop-color="#F5A97F"/>
    </linearGradient>
    <linearGradient id="portalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A6DA95" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#8BD5CA" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8BD5CA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="portalRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A6DA95" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8BD5CA" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="portalGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="350" fill="#24273A" rx="12"/>

  <!-- Background grid (subtle) -->
  <g opacity="0.03" stroke="#C6A0F6" stroke-width="0.5">
    <line x1="0" y1="50" x2="960" y2="50"/>
    <line x1="0" y1="100" x2="960" y2="100"/>
    <line x1="0" y1="150" x2="960" y2="150"/>
    <line x1="0" y1="200" x2="960" y2="200"/>
    <line x1="0" y1="250" x2="960" y2="250"/>
    <line x1="0" y1="300" x2="960" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="350"/>
    <line x1="400" y1="0" x2="400" y2="350"/>
    <line x1="720" y1="0" x2="720" y2="350"/>
  </g>

  <!-- Portal decoration (Rick and Morty style) -->
  <g transform="translate(780, 175)">
    <animateTransform attributeName="transform" type="rotate" from="0 780 175" to="360 780 175" dur="60s" repeatCount="indefinite" additive="replace"/>
    <circle cx="0" cy="0" r="130" fill="url(#portalGrad)">
      <animate attributeName="r" values="130;140;130" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Portal rings -->
  <g transform="translate(780, 175)">
    <animateTransform attributeName="transform" type="rotate" from="360 780 175" to="0 780 175" dur="40s" repeatCount="indefinite" additive="replace"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="url(#portalRing)" stroke-width="1.5" stroke-dasharray="8 6">
      <animate attributeName="stroke-dashoffset" from="0" to="28" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#portalRing)" stroke-width="1" stroke-dasharray="12 8">
      <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#A6DA95" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="16" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Byte icon (8 bits) -->
  <g transform="translate(780, 60)" opacity="0.15">
    <rect x="0" y="0" width="8" height="8" rx="1" fill="#8BD5CA">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2s" repeatCount="indefinite" begin="0s"/>
    </rect>
    <rect x="12" y="0" width="8" height="8" rx="1" fill="#8BD5CA">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <rect x="24" y="0" width="8" height="8" rx="1" fill="#C6A0F6">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <rect x="0" y="12" width="8" height="8" rx="1" fill="#8BD5CA">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <rect x="12" y="12" width="8" height="8" rx="1" fill="#F5A97F">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2s" repeatCount="indefinite" begin="0.8s"/>
    </rect>
    <rect x="24" y="12" width="8" height="8" rx="1" fill="#C6A0F6">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <rect x="0" y="24" width="8" height="8" rx="1" fill="#8BD5CA">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2s" repeatCount="indefinite" begin="1.2s"/>
    </rect>
    <rect x="12" y="24" width="8" height="8" rx="1" fill="#A6DA95">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2s" repeatCount="indefinite" begin="1.4s"/>
    </rect>
  </g>

  <!-- Floating stars -->
  <g opacity="0.5">
    <circle cx="80" cy="40" r="1.5" fill="#C6A0F6">
      <animateTransform attributeName="transform" type="translate" values="0,0;3,-8;0,-16;-3,-8;0,0" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="60" r="1" fill="#8BD5CA">
      <animateTransform attributeName="transform" type="translate" values="0,0;-4,-10;0,-20;4,-10;0,0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="30" r="1.5" fill="#F5A97F">
      <animateTransform attributeName="transform" type="translate" values="0,0;5,-12;0,-24;-5,-12;0,0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="320" r="1" fill="#EED49F">
      <animateTransform attributeName="transform" type="translate" values="0,0;-3,-7;0,-14;3,-7;0,0" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="50" r="1" fill="#ED8796">
      <animateTransform attributeName="transform" type="translate" values="0,0;4,-9;0,-18;-4,-9;0,0" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="300" r="1.5" fill="#B7BDF8">
      <animateTransform attributeName="transform" type="translate" values="0,0;-5,-6;0,-12;5,-6;0,0" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="280" r="1" fill="#8BD5CA">
      <animateTransform attributeName="transform" type="translate" values="0,0;2,-11;0,-22;-2,-11;0,0" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="75" r="1" fill="#C6A0F6">
      <animateTransform attributeName="transform" type="translate" values="0,0;-2,-9;0,-18;2,-9;0,0" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Binary digits floating -->
  <g font-family="'Courier New', monospace" font-size="10" opacity="0.08" fill="#8BD5CA">
    <text x="30" y="120">01100010</text>
    <text x="730" y="130">01111001</text>
    <text x="50" y="220">01110100</text>
    <text x="700" y="250">01100101</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-15;0,0" dur="8s" repeatCount="indefinite"/>
  </g>

  <!-- Terminal prompt line -->
  <g font-family="'Courier New', monospace" font-size="18">
    <text x="50" y="100" fill="#A5ADCB">
      <tspan fill="#8BD5CA" font-weight="bold">➜</tspan>
      <tspan dx="8" fill="#C6A0F6">~</tspan>
      <tspan dx="8" fill="#CAD3F5">bytistic</tspan>
    </text>
  </g>

  <!-- Main typing text + reveal mask -->
  <g font-family="'Courier New', monospace" font-size="36" font-weight="bold">
    <text x="50" y="160" fill="url(#headerGrad)">$ Hi, I'm bytistic</text>
    <!-- Reveal mask that shrinks to uncover text -->
    <rect x="50" y="125" width="484" height="44" fill="#24273A">
      <animate attributeName="width" from="484" to="0" dur="2.5s" fill="freeze" begin="0.3s"/>
    </rect>
  </g>

  <!-- Cursor (moves with typing) -->
  <rect x="50" y="125" width="3" height="42" rx="1.5" fill="#C6A0F6" filter="url(#glow)">
    <animate attributeName="x" from="50" to="534" dur="2.5s" fill="freeze" begin="0.3s"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle (fades in after typing) -->
  <text x="480" y="240" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#A5ADCB" opacity="0">
    Software Architect &amp; Full Stack Developer
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" fill="freeze" begin="3.2s"/>
  </text>

  <!-- Decorative line under subtitle -->
  <line x1="240" y1="280" x2="720" y2="280" stroke="url(#headerGrad)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="0.3" dur="1s" fill="freeze" begin="4s"/>
  </line>
</svg>
