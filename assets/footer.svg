<svg width="600" height="80" viewBox="0 0 600 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C6A0F6"/>
      <stop offset="50%" stop-color="#8BD5CA"/>
      <stop offset="100%" stop-color="#F5A97F"/>
    </linearGradient>
  </defs>

  <rect width="600" height="80" fill="#24273A" rx="12"/>

  <!-- Rick and Morty portal (mini) -->
  <g transform="translate(45, 40)" opacity="0.2">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#A6DA95" stroke-width="2" stroke-dasharray="6 4">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="10s" repeatCount="indefinite" additive="sum"/>
    </circle>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#8BD5CA" stroke-width="1.5" stroke-dasharray="4 3">
      <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="7s" repeatCount="indefinite" additive="sum"/>
    </circle>
    <circle cx="0" cy="0" r="4" fill="#A6DA95" opacity="0.5"/>
  </g>

  <!-- Rick and Morty quote -->
  <text x="300" y="30" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#8BD5CA" opacity="0.6">
    "Wubba lubba dub dub!"
  </text>

  <!-- Subtitle -->
  <text x="300" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#6E738D">
    — Rick Sanchez, probably
  </text>

  <!-- Byte icon mini -->
  <g transform="translate(555, 32)" opacity="0.15">
    <rect x="0" y="0" width="4" height="4" rx="0.5" fill="#C6A0F6"/>
    <rect x="6" y="0" width="4" height="4" rx="0.5" fill="#C6A0F6"/>
    <rect x="0" y="6" width="4" height="4" rx="0.5" fill="#8BD5CA"/>
    <rect x="6" y="6" width="4" height="4" rx="0.5" fill="#8BD5CA"/>
    <rect x="12" y="0" width="4" height="4" rx="0.5" fill="#F5A97F"/>
    <rect x="18" y="0" width="4" height="4" rx="0.5" fill="#F5A97F"/>
    <rect x="12" y="6" width="4" height="4" rx="0.5" fill="#ED8796"/>
    <rect x="18" y="6" width="4" height="4" rx="0.5" fill="#ED8796"/>
  </g>

  <!-- Divider -->
  <line x1="120" y1="68" x2="480" y2="68" stroke="url(#footerGrad)" stroke-width="0.5" opacity="0.2"/>
</svg>
